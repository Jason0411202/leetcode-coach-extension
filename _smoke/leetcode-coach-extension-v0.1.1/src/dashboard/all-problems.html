<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>所有題目 — LeetCode Coach</title>
  <link rel="stylesheet" href="list-shared.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>📋 所有題目</h1>
      <a class="back-link" id="back-link">← 回 dashboard</a>
    </header>

    <div class="controls">
      <input type="text" class="search-input" id="search" placeholder="搜尋 slug…">
      <select class="filter" id="filter-pattern">
        <option value="">全部 pattern</option>
      </select>
      <select class="filter" id="filter-status">
        <option value="">全部狀態</option>
        <option value="overdue">逾期</option>
        <option value="today">今日</option>
        <option value="future">未來</option>
        <option value="mistake">錯題</option>
      </select>
      <select class="filter" id="sort">
        <option value="next_review">依複習日</option>
        <option value="last_score">依最後評分</option>
        <option value="first_seen">依加入日</option>
        <option value="rating_count">依練習次數</option>
      </select>
    </div>

    <table class="problem-table" id="table">
      <thead>
        <tr>
          <th>Slug</th>
          <th>Patterns</th>
          <th>最後評分</th>
          <th>下次複習</th>
          <th>練習次數</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="empty" id="empty" hidden>
      <div class="art">📚</div>
      <p>還沒有題目。先在 LeetCode 上開個題目試試!</p>
    </div>
  </div>

  <script type="module" src="all-problems.js"></script>
</body>
</html>
