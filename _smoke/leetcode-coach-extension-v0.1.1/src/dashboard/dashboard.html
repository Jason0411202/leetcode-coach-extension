<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>LeetCode Coach</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main class="dash">
    <header class="dash-header">
      <h1>📚 LeetCode Coach</h1>
      <button id="settings-btn" class="icon-btn" title="設定">⚙️</button>
    </header>

    <section class="cta-card" id="cta-card">
      <div class="cta-stats">
        <div>
          <span class="cta-label">今日複習</span>
          <strong class="cta-num" id="today-count">-</strong>
        </div>
        <div class="cta-divider"></div>
        <div>
          <span class="cta-label">錯題</span>
          <strong class="cta-num cta-mistake" id="mistake-count">-</strong>
        </div>
      </div>
      <button id="start-review" class="btn-primary">▶ 開始複習</button>
      <p class="cta-hint" id="cta-hint" hidden>太棒了 🎉 今天沒有要複習的題目</p>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">累積</div>
        <div class="stat-value" id="total-problems">-</div>
        <div class="stat-sub">題</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">連續</div>
        <div class="stat-value" id="streak">-</div>
        <div class="stat-sub">天</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">本週</div>
        <div class="stat-value" id="week-count">-</div>
        <div class="stat-sub">題</div>
      </div>
    </section>

    <section class="section">
      <h2>📈 過去 30 天</h2>
      <div id="activity-heatmap" class="heatmap"></div>
    </section>

    <section class="section">
      <h2>🎯 Pattern 熟練度</h2>
      <div id="pattern-bars" class="pattern-list"></div>
      <p id="pattern-empty" class="empty-msg" hidden>還沒有評分資料,先在 LeetCode 練幾題!</p>
    </section>

    <nav class="footer-nav">
      <a id="open-all-problems">📋 所有題目</a>
      <a id="open-mistakes">⚠️ 錯題本</a>
      <a id="open-settings">⚙️ 設定</a>
    </nav>
  </main>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
