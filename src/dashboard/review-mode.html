<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>複習模式 — LeetCode Coach</title>
  <link rel="stylesheet" href="review-mode.css">
</head>
<body>
  <header class="rm-header" id="rm-header">
    <div class="rm-progress">
      <span id="current-idx">-</span> / <span id="total-cards">-</span>
    </div>
    <div class="rm-progress-bar"><div class="rm-progress-fill" id="progress-fill"></div></div>
    <button id="exit-btn" class="rm-exit" title="結束複習">✕</button>
  </header>

  <main class="rm-main" id="rm-main">
    <div id="card-slot"></div>
    <div class="rm-actions">
      <button id="open-leetcode" class="btn-secondary">↗ 在 LeetCode 開啟</button>
      <button id="skip-btn" class="btn-secondary">⏭ 跳過</button>
    </div>
  </main>

  <section id="finished-screen" class="rm-finished" hidden>
    <div class="finished-art">🎉</div>
    <h2>今日複習完成!</h2>
    <p>你已經複習了 <span id="completed-count">0</span> 題</p>
    <p class="finished-streak" id="finished-streak"></p>
    <button class="btn-primary" id="close-finished">關閉</button>
  </section>

  <section id="empty-screen" class="rm-finished" hidden>
    <div class="finished-art">😌</div>
    <h2>沒有需要複習的題目</h2>
    <p>先在 LeetCode 上練幾題,評分後會自動進入複習排程</p>
    <button class="btn-primary" id="close-empty">關閉</button>
  </section>

  <script type="module" src="review-mode.js"></script>
</body>
</html>
