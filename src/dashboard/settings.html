<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>設定 — LeetCode Coach</title>
  <link rel="stylesheet" href="list-shared.css">
  <style>
    .settings-section {
      background: var(--lc-surface);
      border: 1px solid var(--lc-border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .settings-section h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field label {
      font-weight: 600;
      font-size: 13px;
    }
    .field .help {
      font-size: 12px;
      color: var(--lc-muted);
    }
    .field input[type="text"], .field input[type="number"] {
      padding: 8px 12px;
      border: 1px solid var(--lc-border);
      border-radius: 8px;
      background: var(--lc-bg);
      color: var(--lc-text);
      font-size: 13px;
      font-family: monospace;
    }
    .field-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .save-bar {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .save-bar .btn-primary {
      padding: 10px 20px;
      background: var(--lc-primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      background: var(--lc-success);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .danger-zone {
      border-color: var(--lc-danger);
      background: rgba(248, 81, 73, 0.05);
    }
    .danger-zone h2 { color: var(--lc-danger); }
    .btn-danger {
      padding: 8px 14px;
      background: transparent;
      color: var(--lc-danger);
      border: 1px solid var(--lc-danger);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-danger:hover { background: var(--lc-danger); color: white; }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>⚙️ 設定</h1>
      <a class="back-link" id="back-link">← 回 dashboard</a>
    </header>

    <section class="settings-section">
      <h2>📚 內容來源</h2>
      <div class="field">
        <label for="content-repo-url">內容 repo raw URL</label>
        <input type="text" id="content-repo-url"
               placeholder="https://raw.githubusercontent.com/Jason0411202/leetcode-coach-content/main">
        <p class="help">extension 從這個 URL 抓題目 JSON。改成你 fork 的私人題庫,可以放自訂題目。</p>
      </div>
      <div class="field">
        <label for="github-repo-issues">回報 issue 用的 GitHub repo</label>
        <input type="text" id="github-repo-issues" placeholder="Jason0411202/leetcode-coach-content">
        <p class="help">點「回報內容問題」會打開這個 repo 的 New Issue 頁面。</p>
      </div>
      <div class="save-bar">
        <button class="btn" id="refresh-content">🔄 立即重新抓題庫</button>
      </div>
    </section>

    <section class="settings-section">
      <h2>📅 複習行為</h2>
      <div class="field">
        <label for="daily-cap">每日複習上限</label>
        <input type="number" id="daily-cap" min="1" max="100" step="1">
        <p class="help">每日佇列最多包含這麼多題(預設 20)。</p>
      </div>
      <div class="field-toggle">
        <input type="checkbox" id="auto-score">
        <label for="auto-score">啟用自動評分推估</label>
      </div>
      <p class="help" style="margin: 4px 0 0 26px;">
        當你不手動評分時,根據看了哪些內容自動推估分數。
      </p>
    </section>

    <section class="settings-section">
      <h2>💾 資料管理</h2>
      <div class="save-bar">
        <button class="btn" id="export-btn">📤 匯出 JSON 備份</button>
        <button class="btn" id="import-btn">📥 從 JSON 還原</button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>
    </section>

    <section class="settings-section danger-zone">
      <h2>⚠️ 危險區</h2>
      <p class="help" style="margin-bottom: 12px;">
        以下動作不可復原。匯出備份後再操作會比較安心。
      </p>
      <button class="btn-danger" id="clear-all">清空所有複習資料</button>
    </section>

    <div class="save-bar" style="position: sticky; bottom: 0; background: var(--lc-bg); padding: 12px 0; border-top: 1px solid var(--lc-border);">
      <button class="btn-primary" id="save-btn">💾 儲存設定</button>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none;"></div>

  <script type="module" src="settings.js"></script>
</body>
</html>
