name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests
        run: node --test test/scheduler.test.mjs test/auto-score.test.mjs

  syntax:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify all source files parse as ES modules
        shell: bash
        run: |
          set -e
          fail=0
          for f in $(find src -name "*.js"); do
            if ! node --check "$f" 2>/dev/null; then
              echo "::error file=$f::syntax error"
              node --check "$f" || true
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All JS files parse OK."

  build-check:
    name: Build smoke
    runs-on: ubuntu-latest
    needs: [test, syntax]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/generate-icons.mjs
      - run: node scripts/build.mjs
      - name: Verify zip layout
        shell: bash
        run: |
          set -e
          ZIP=$(ls dist/*.zip)
          unzip -l "$ZIP"
          unzip -t "$ZIP" > /dev/null
          echo "Zip is valid."
