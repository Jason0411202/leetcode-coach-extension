name: Build & Release Extension

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag (e.g. v0.2.0). If empty, only build artifacts will be uploaded."
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run unit tests
        run: node --test test/scheduler.test.mjs test/auto-score.test.mjs

  build:
    name: Build extension
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_name: ${{ steps.version.outputs.zip_name }}
      zip_sha256: ${{ steps.version.outputs.zip_sha256 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.manifest_version !== 3) { console.error('manifest_version must be 3'); process.exit(1); }
            if (!/^\d+\.\d+\.\d+(\.\d+)?$/.test(m.version)) { console.error('Invalid version'); process.exit(1); }
            if (!m.icons || !m.icons['16'] || !m.icons['48'] || !m.icons['128']) { console.error('Missing icons'); process.exit(1); }
            console.log('manifest.json OK — version', m.version);
          "

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Build dist/ + zip
        run: node scripts/build.mjs

      - name: Compute outputs
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./manifest.json').version")
          ZIP="leetcode-coach-extension-v${VERSION}.zip"
          SHA=$(sha256sum "dist/${ZIP}" | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP" >> "$GITHUB_OUTPUT"
          echo "zip_sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "::notice title=Build OK::Built ${ZIP} (sha256=${SHA})"

      - name: Smoke-test the zip
        shell: bash
        run: |
          set -euo pipefail
          # Simulate what Windows Explorer / macOS Finder do: extract into
          # a folder named after the zip (without the .zip extension).
          ZIP="dist/${{ steps.version.outputs.zip_name }}"
          EXTRACT_DIR="_smoke/$(basename "${{ steps.version.outputs.zip_name }}" .zip)"
          mkdir -p "$EXTRACT_DIR"
          unzip -q "$ZIP" -d "$EXTRACT_DIR"

          # manifest.json must sit at the root of the extracted folder
          # (so Chrome's "Load unpacked" → that folder → works first try)
          test -f "$EXTRACT_DIR/manifest.json"
          test -f "$EXTRACT_DIR/icons/icon128.png"
          test -f "$EXTRACT_DIR/src/background.js"
          test -f "$EXTRACT_DIR/src/components/review-card.js"
          test -f "$EXTRACT_DIR/src/content/injector.js"
          test -f "$EXTRACT_DIR/src/dashboard/dashboard.html"

          # Make sure none of the dev-only directories leaked in
          for d in test scripts docs .github node_modules; do
            if [ -d "$EXTRACT_DIR/$d" ]; then
              echo "::error::$d/ directory was packaged"; exit 1
            fi
          done

          # Confirm no double-nesting (the bug v0.1.0 had)
          if [ -d "$EXTRACT_DIR/leetcode-coach-extension" ]; then
            echo "::error::Zip is double-nested — files should be at zip root"; exit 1
          fi

          echo "Smoke test passed: manifest.json sits at $EXTRACT_DIR/manifest.json"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: dist/${{ steps.version.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload release.json
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: dist/release.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload unpacked dist (for reviewers)
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-dist
          path: dist/leetcode-coach-extension/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: ./release-zip

      - uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: ./release-meta

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          cat > /tmp/notes.md <<'EOF'
          ## LeetCode Coach v${{ needs.build.outputs.version }}

          ### 下載並安裝(三步)

          1. 下載 [`${{ needs.build.outputs.zip_name }}`](../../releases/download/${{ steps.tag.outputs.tag }}/${{ needs.build.outputs.zip_name }})
          2. **右鍵 → 解壓縮**(Windows / macOS 的內建解壓縮工具會自動建立一個與檔名同名的資料夾,例如 `leetcode-coach-extension-v${{ needs.build.outputs.version }}/`,裡面直接是 `manifest.json`)
          3. 打開 Chrome → `chrome://extensions/` → 右上角開啟「**開發人員模式**」→ 點「**載入未封裝項目**」→ **選擇剛剛解壓縮出來的那個資料夾**

          ✅ 完成。Chrome 工具列會出現 📘 圖示,LeetCode 題目頁面右下角會出現浮動按鈕。

          ### 驗證

          - SHA-256: `${{ needs.build.outputs.zip_sha256 }}`

          ### 疑難排解

          **「資訊清單檔案遺失或無法讀取」**:你選錯資料夾了。確認你選的資料夾**直接**包含 `manifest.json`(而不是再進一層才看到)。如果用 7-Zip 之類的工具解壓縮,可能會多包一層 — 進去再選一次。
          EOF
          echo "path=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LeetCode Coach ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            release-zip/${{ needs.build.outputs.zip_name }}
            release-meta/release.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

  prerelease-snapshot:
    name: Update prerelease snapshot
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: ./snapshot

      - uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: ./snapshot

      - name: Tag rolling 'main-snapshot' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-snapshot
          name: "Latest from main (rolling)"
          body: |
            **Rolling build of `main` branch.**
            Built from commit `${{ github.sha }}` at `${{ github.event.head_commit.timestamp }}`.

            For stable releases, use the tagged versions instead.

            SHA-256: `${{ needs.build.outputs.zip_sha256 }}`
          files: |
            snapshot/${{ needs.build.outputs.zip_name }}
            snapshot/release.json
          prerelease: true
          fail_on_unmatched_files: true
